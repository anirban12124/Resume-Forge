# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, direct dependency to find app modules
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to allow for slug
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded with relative paths
# relative_imports = false

# version locations
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# version path separator; defaults to OS line separator.
# version_path_separator = os

sqlalchemy.url = postgresql://neondb_owner:npg_cKe82MjxUizg@ep-rough-boat-ao4847u2.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
